$Mod = SUPER # Sets "Windows" key as main modifier
$sMod = SUPER_SHIFT # Sets "Windows+Shift" 

bind = $Mod, Return, exec, $terminal
bind = $sMod, Return, exec, $terminal --title floating-terminal
bind = $Mod, B, exec, $browser
bind = $sMod, B, exec, bash -c 'pgrep waybar && pkill waybar || waybar &'
bind = $Mod, Q, killactive,
bind = $Mod, E, exec, $fileManager
bind = $sMod, E, exec, $terminal --title floating-terminal -e bash -c "yazi" # I dont know how to use the $fileManager variable here
bind = $Mod, W, togglefloating,
bind = $sMod, W, exec, ~/Scripts/wallpaper.sh
bind = $sMod, T, exec, ~/Scripts/blur.sh
bind = $Mod, D, exec, $menu
bind = $Mod, P, pseudo, # dwindle
bind = $Mod, N, togglesplit, # dwindle
bind = $Mod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = $Mod, Backspace, exec, wlogout -b 2
bind = $Mod, I, exec, hyprlock
bind = $Mod, F, fullscreen
bind = $Mod, O, exec, $notes
bind = ALT, a, exec, ~/.config/waybar/refresh.sh 
bind = ALT, r, exec, ~/.config/swaync/refresh.sh
bind = $Mod, PRINT, exec, bash -c 'FILE=~/Pictures/Screenshots/screenshot_$(date +%Y-%m-%d_%H-%M-%S).png && grimblast save area "$FILE" && wl-copy < "$FILE" && notify-send "Screenshot salvato e copiato negli appunti"'
bind = $Mod, C, exec, $terminal $editor
bind = $Mod, A, exec, $terminal --title floating-terminal -e pulsemixer

# Move focus with $Mod + vim keys
bind = $Mod, H, movefocus, l
bind = $Mod, L, movefocus, r
bind = $Mod, K, movefocus, u
bind = $Mod, J, movefocus, d

# Switch workspaces with $Mod + [0-9]
bind = $Mod, 1, exec, ~/Scripts/smart-ws.sh 1
bind = $Mod, 2, exec, ~/Scripts/smart-ws.sh 2
bind = $Mod, 3, exec, ~/Scripts/smart-ws.sh 3
bind = $Mod, 4, exec, ~/Scripts/smart-ws.sh 4
bind = $Mod, 5, exec, ~/Scripts/smart-ws.sh 5
bind = $Mod, 6, exec, ~/Scripts/smart-ws.sh 6
bind = $Mod, 7, exec, ~/Scripts/smart-ws.sh 7
bind = $Mod, 8, exec, ~/Scripts/smart-ws.sh 8
bind = $Mod, 9, exec, ~/Scripts/smart-ws.sh 9
bind = $Mod, 0, exec, ~/Scripts/smart-ws.sh 10

# Move active window to a workspace with $Mod + SHIFT + [0-9]
bind = $sMod, 1, exec, ~/Scripts/smart-move-ws.sh 1
bind = $sMod, 2, exec, ~/Scripts/smart-move-ws.sh 2
bind = $sMod, 3, exec, ~/Scripts/smart-move-ws.sh 3
bind = $sMod, 4, exec, ~/Scripts/smart-move-ws.sh 4
bind = $sMod, 5, exec, ~/Scripts/smart-move-ws.sh 5
bind = $sMod, 6, exec, ~/Scripts/smart-move-ws.sh 6
bind = $sMod, 7, exec, ~/Scripts/smart-move-ws.sh 7
bind = $sMod, 8, exec, ~/Scripts/smart-move-ws.sh 8
bind = $sMod, 9, exec, ~/Scripts/smart-move-ws.sh 9
bind = $sMod, 0, exec, ~/Scripts/smart-move-ws.sh 10

# Example special workspace
bind = $Mod, S, togglespecialworkspace, magic
bind = $sMod, S, movetoworkspace, special:magic

# Move/resize windows with $Mod + LMB/RMB and dragging
bindm = $Mod, mouse:272, movewindow
bindm = $Mod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
